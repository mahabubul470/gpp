<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0b0e14"/>
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="#1f2733"/>

  <!-- logo -->
  <text x="80" y="110" font-family="JetBrains Mono, monospace" font-size="34" font-weight="600">
    <tspan fill="#4ade80">gpp</tspan><tspan fill="#5c6773"> · git++</tspan>
  </text>

  <!-- headline -->
  <text x="80" y="220" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#e6e9ef">Version control that remembers —</text>
  <text x="80" y="290" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#4ade80">and knows when it's wrong.</text>

  <!-- terminal card -->
  <rect x="80" y="350" width="1040" height="180" rx="12" fill="#0d1117" stroke="#1f2733"/>
  <circle cx="108" cy="378" r="5" fill="#2c3644"/>
  <circle cx="126" cy="378" r="5" fill="#2c3644"/>
  <circle cx="144" cy="378" r="5" fill="#2c3644"/>
  <text x="80" y="425" font-family="JetBrains Mono, monospace" font-size="21" xml:space="preserve">
    <tspan x="108" fill="#4ade80">$ </tspan><tspan fill="#e6e9ef">gpp belief bisect "token expiry is 24h"</tspan>
  </text>
  <text x="108" y="460" font-family="JetBrains Mono, monospace" font-size="21" xml:space="preserve">
    <tspan fill="#f87171">INVALIDATED</tspan><tspan fill="#9aa4b2">  cs:fhcpef7c  "raise token expiry to 7 days"</tspan>
  </text>
  <text x="108" y="493" font-family="JetBrains Mono, monospace" font-size="21">
    <tspan fill="#f87171">-  7 | pub const EXPIRY_HOURS: u64 = 24;</tspan>
  </text>
  <text x="108" y="519" font-family="JetBrains Mono, monospace" font-size="21">
    <tspan fill="#4ade80">+  7 | pub const EXPIRY_HOURS: u64 = 168;</tspan>
  </text>

  <!-- footer -->
  <text x="80" y="583" font-family="Inter, sans-serif" font-size="22" fill="#5c6773">AI-native version control in Rust · MIT · github.com/mahabubul470/gpp</text>
</svg>

name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - name: Install deps (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} --bin gpp --bin gpp-relay
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -C target/${{ matrix.target }}/release -czf gpp-${{ matrix.target }}.tar.gz gpp gpp-relay
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/gpp.exe, target/${{ matrix.target }}/release/gpp-relay.exe -DestinationPath gpp-${{ matrix.target }}.zip
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            gpp-${{ matrix.target }}.tar.gz
            gpp-${{ matrix.target }}.zip

  # Publishes the whole workspace (21 crates, dependency-ordered) when the
  # CARGO_REGISTRY_TOKEN secret is configured; a no-op otherwise. `gpp` the
  # crate name is taken on crates.io — the binary crate is `gpp-cli`, which
  # still installs a binary named `gpp`.
  crates-io:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev cmake clang
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish workspace to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        # crates.io rate-limits NEW crate names (burst, then 1 per 10 min).
        # --workspace skips already-published versions, so retrying after
        # each window makes forward progress until all crates are through.
        run: |
          for attempt in $(seq 1 20); do
            if cargo publish --workspace; then exit 0; fi
            echo "::warning::publish attempt $attempt rate-limited; waiting 10m30s"
            sleep 630
          done
          exit 1
      - name: Skipped (no CARGO_REGISTRY_TOKEN secret)
        if: env.CARGO_REGISTRY_TOKEN == ''
        run: echo "crates.io publish skipped — add the CARGO_REGISTRY_TOKEN repo secret to enable"

  images:
    runs-on: ubuntu-latest
    permissions: { packages: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: gpp image
        run: |
          docker build -f deploy/gpp/Dockerfile -t ghcr.io/${{ github.repository_owner }}/gpp:${{ github.ref_name }} .
          docker push ghcr.io/${{ github.repository_owner }}/gpp:${{ github.ref_name }}
      - name: gpp-relay image
        run: |
          docker build -f deploy/relay/Dockerfile -t ghcr.io/${{ github.repository_owner }}/gpp-relay:${{ github.ref_name }} .
          docker push ghcr.io/${{ github.repository_owner }}/gpp-relay:${{ github.ref_name }}
